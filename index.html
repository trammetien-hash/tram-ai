<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Bot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main id="app">

  <!-- 🏠 HOME -->
  <section id="home" class="page active">
    <div class="app">
      <!-- CHARACTER BAR -->
<div class="char-bar" onclick="togglePanel()">
  <img src="assets/bot_idle.png" />
  <span id="botDisplay">Unnamed bot</span>
</div>
      
      <header class="top-bar">
  <button class="profile-btn" onclick="openProfile()">☰</button>
      </header>

      <div class="chat-area" id="chatArea"></div>

<footer class="input-bar">
  
        <input id="userInput" placeholder="Type a message..."/>
        <button id="sendBtn" class="send-btn">➤</button>
      </footer>
    </div>
  </section>

  <div id="profileModal" class="profile-modal hidden">
  <div class="profile-box">
    <h3>Profile</h3>

    <input id="userName" placeholder="Your name..." />
    <input id="botName" placeholder="Bot name..." />
    <textarea id="bio" placeholder="Your vibe..."></textarea>

    <button onclick="saveProfile()">Save</button>
  </div>
  </div>
  
<!-- CHARACTER PANEL -->
  <div class="panel-content">
    <div class="char-item">🤖 Bot 1</div>
    <div class="char-item">😎 Chill bot</div>
    <div class="char-item">👻 Ghost bot</div>
  </div>
  </div>
  
  <script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
</script>
<script src="script.js"></script>
</body>
    </html>
