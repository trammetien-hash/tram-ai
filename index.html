<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Bot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- 🏠 HOME (CHAT CỦA M - GIỮ NGUYÊN) -->
  <div id="home" class="page active">
    <div class="app">

      <header class="top-bar">
        <div class="bot-info">
          <img src="assets/bot_idle.png" alt="Bot Avatar" class="avatar" />
          <div class="bot-text">
            <h2 id="chatName">AI Companion</h2>
            <p class="status">Online</p>
          </div>
        </div>
      </header>

      <main class="chat-area" id="chatArea">
        <div class="empty-state" id="emptyState">
          <p>Start a conversation</p>
        </div>
      </main>

      <footer class="input-bar">
        <input 
          type="text" 
          id="userInput" 
          placeholder="Type a message..."
          autocomplete="off"
        />
        <button id="sendBtn">Send</button>
      </footer>

    </div>
  </div>

  <!-- 🔍 DISCOVER -->
  <div id="discover" class="page">
    <div class="discover-page">
      <input type="text" placeholder="Search..." id="searchInput">
<div id="characterList" class="grid">

  <div class="card">
    <img src="assets/noah.jpg">
    <h3>Noah</h3>
    <p>Gentle boy</p>
  </div>

  <div class="card">
    <img src="assets/kai.jpg">
    <h3>Kai</h3>
    <p>Bad boy</p>
  </div>

</div>

  <!-- ➕ CREATE -->
  <div id="create" class="page">
    <div class="create-page">
      <h2>Create Character</h2>

      <input type="text" id="createName" placeholder="Name">
      <input type="text" id="createDesc" placeholder="Description">
      <input type="text" id="createImg" placeholder="Image URL">

      <button id="createBtn">Create</button>
    </div>
  </div>

  <!-- 💬 CHATS -->
  <div id="chats" class="page">
    <div class="chats-page">
      <h2>Chats</h2>
      <p>Coming soon...</p>
    </div>
  </div>

  <!-- 👤 PROFILE -->
  <div id="profile" class="page">
    <div class="profile-page">
      <h2>Profile</h2>
      <p>Settings, info...</p>
    </div>
  </div>

</div>

<!-- 📱 NAVBAR -->
<div class="bottom-nav">
  <button onclick="switchTab('home')">🏠</button>
  <button onclick="switchTab('discover')">🔍</button>
  <button onclick="switchTab('create')">➕</button>
  <button onclick="switchTab('chats')">💬</button>
  <button onclick="switchTab('profile')">👤</button>
</div>

<script src="script.js"></script>
</body>
          </html>
