<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Bot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main id="app">

  <!-- 🏠 HOME -->
  <section id="home" class="page active">
    <div class="app">

      <!-- TOP BAR -->
      <header class="top-bar">
        <button class="profile-btn" onclick="openProfile()">☰</button>
      </header>

      <!-- CHAT -->
      <div class="chat-area" id="chatArea"></div>

      <!-- INPUT -->
      <footer class="input-bar">
        <input 
          id="userInput" 
          type="text"
          placeholder="Type a message..."
          autocomplete="off"
        />
        <button id="sendBtn" class="send-btn">➤</button>
      </footer>

    </div>
  </section>

</main>

<!-- 🧑 PROFILE -->
<div id="profileModal" class="profile-modal hidden">
  <div class="profile-box">
    <h3>Profile</h3>

    <input id="userName" placeholder="Your name..." />
    <input id="botName" placeholder="Bot name..." />
    <textarea id="bio" placeholder="Your vibe..."></textarea>

    <button onclick="saveProfile()">Save</button>
  </div>
</div>

<!-- 🔥 OVERLAY CHỌN BOT -->
<div id="panel" class="panel hidden">

  <!-- click ngoài để đóng -->
  <div class="overlay" onclick="togglePanel()"></div>

  <div class="panel-box">

    <h3>Choose your bot</h3>

    <!-- 🧠 để trống → sau này m render bằng JS -->
    <div id="botList"></div>

  </div>

</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
  lucide.createIcons();
</script>
<script src="script.js" type="module"></script>

</body>
  </html>
