<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Bot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main id="app">

  <!-- 🏠 HOME -->
  <section id="home" class="page active">
    <div class="app">
      <header class="top-bar">
        <div class="bot-info">
          <img src="assets/bot_idle.png" class="avatar"/>
          <div>
            <h2 id="chatName">AI Companion</h2>
            <p class="status">Online</p>
          </div>
        </div>
      </header>

      <div class="chat-area" id="chatArea">
        <div class="empty-state">Start a conversation</div>
      </div>

      <footer class="input-bar">
        <input id="userInput" placeholder="Type a message..."/>
        <button id="sendBtn">Send</button>
      </footer>
    </div>
  </section>

  <!-- 🔍 DISCOVER -->
  <section id="discover" class="page">
    <div class="discover-page">
      <input id="searchInput" placeholder="Search..."/>
      <div id="characterList" class="grid"></div>
    </div>
  </section>

  <!-- ➕ CREATE -->
  <section id="create" class="page">
    <div class="create-page">
      <h2>Create Character</h2>
      <input id="createName" placeholder="Name"/>
      <input id="createDesc" placeholder="Description"/>
      <input id="createImg" placeholder="Image URL"/>
      <button id="createBtn">Create</button>
    </div>
  </section>

  <!-- 💬 CHATS -->
  <section id="chats" class="page">
    <div class="chats-page">Coming soon...</div>
  </section>

  <!-- 👤 PROFILE -->
  <section id="profile" class="page">
    <div class="profile-page">Profile</div>
  </section>

</main>

<!-- NAV -->
<nav class="bottom-nav">
  <div class="nav-item active" data-page="home">Home</div>
  <div class="nav-item" data-page="discover">Discover</div>
  <div class="nav-center" id="openCreate">+</div>
  <div class="nav-item" data-page="chats">Chats</div>
  <div class="nav-item" data-page="profile">Profile</div>
</nav>

<script src="script.js"></script>
</body>
    </html>
