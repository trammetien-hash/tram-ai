<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Bot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- Header -->
    <header class="top-bar">
      <div class="bot-info">
        <img src="assets/bot_idle.png" alt="Bot Avatar" class="avatar" />
        <div class="bot-text">
          <h2>AI Companion</h2>
          <p class="status">Online</p>
        </div>
      </div>
    </header>

    <!-- Chat Area -->
    <main class="chat-area" id="chatArea">
      <div class="message bot">
        <p>Hello. I’m here.</p>
      </div>
    </main>

    <!-- Input Area -->
    <footer class="input-bar">
      <input 
        type="text" 
        id="userInput" 
        placeholder="Type a message..."
        autocomplete="off"
      />
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
